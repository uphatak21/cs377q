<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; }
    #chat-container { width: 300px; height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    #user-input { width: calc(100% - 22px); padding: 10px; }
    .message { margin-bottom: 10px; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-log"></div>
    <input type="text" id="user-input" placeholder="Type a message...">
    <button id="send-btn">Send</button>
    <button id="open-welcome">Open Welcome Page</button>
    <button id="voice-btn">Speak</button>
    <button id="clear-btn">Clear Chat</button>
    <div id="message"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
